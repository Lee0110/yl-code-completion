settings.tooltip.enabled=开启后会在编辑器内显示灰色 inline 补全；关闭后不会发起补全请求。
settings.tooltip.baseUrl=DeepSeek FIM 接口地址。默认使用 https://api.deepseek.com/beta，请保持能够拼接 /completions。
settings.tooltip.apiKey=DeepSeek API Key。当前会保存到插件配置 XML，不再使用系统钥匙串。
settings.tooltip.model=补全使用的模型。deepseek-v4-flash 更快更省，deepseek-v4-pro 质量更高但成本更高。
settings.tooltip.maxTokens=单次最多生成的 token 数。代码补全建议 64，减少过长建议和 token 消耗。
settings.tooltip.temperature=生成随机性。代码补全建议 0.15，偏稳定、少发散。
settings.tooltip.topP=采样范围。代码补全建议 0.90，和较低 temperature 配合保持结果稳定。
settings.tooltip.debounceMs=输入停止多久后再请求补全。150ms 通常比较跟手，也能减少无效请求。
settings.tooltip.timeoutMs=单次请求超时时间。5000ms 兼顾响应速度和网络波动。
settings.tooltip.contextMaxChars=发送给模型的最大上下文字符数。默认 4000，前缀约 70%，后缀约 30%。
settings.tooltip.triggerMinPrefixLength=光标前至少多少个字符才触发自动补全。默认 2，避免空行或刚开始输入时过早请求。
settings.tooltip.disabledExtensions=逗号分隔的禁用扩展名，例如 md,txt,json；匹配后不会自动触发补全。
